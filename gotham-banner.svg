<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200" style="background:#090d16; border-radius: 8px; border: 1px solid #1f2d3d; font-family: monospace;">
  <!-- Definitions for pattern and gradients -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#121824" stroke-width="1"/>
    </pattern>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FF9F00" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#090d16" stop-opacity="1" />
      <stop offset="50%" stop-color="#FFC107" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#090d16"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Subtle center glow -->
  <rect x="100" y="40" width="600" height="120" fill="url(#glowGrad)" rx="10" />

  <!-- Outer Boundary Cyberpunk Borders -->
  <line x1="15" y1="15" x2="785" y2="15" stroke="#1f2d3d" stroke-width="1.5" />
  <line x1="15" y1="185" x2="785" y2="185" stroke="#1f2d3d" stroke-width="1.5" />
  <line x1="15" y1="15" x2="15" y2="185" stroke="#1f2d3d" stroke-width="1.5" />
  <line x1="785" y1="15" x2="785" y2="185" stroke="#1f2d3d" stroke-width="1.5" />
  
  <!-- Gotham Accents / Tech Brackets -->
  <path d="M 15 35 L 15 15 L 35 15" fill="none" stroke="#FFC107" stroke-width="3" />
  <path d="M 785 35 L 785 15 L 765 15" fill="none" stroke="#FFC107" stroke-width="3" />
  <path d="M 15 165 L 15 185 L 35 185" fill="none" stroke="#FFC107" stroke-width="3" />
  <path d="M 785 165 L 785 185 L 765 185" fill="none" stroke="#FFC107" stroke-width="3" />

  <!-- Technical Telemetry & Diagnostics -->
  <!-- Left Side System Info -->
  <text x="30" y="40" fill="#6b7280" font-size="10" font-weight="bold" letter-spacing="1">SYS.LOC: 40.7128° N, 74.0060° W // GOTHAM_BASE</text>
  <text x="30" y="55" fill="#4b5563" font-size="9" letter-spacing="1">CORES: 128_VECTOR_THREAD_MATRIX</text>
  <text x="30" y="70" fill="#4b5563" font-size="9" letter-spacing="1">LINK_STATUS: STABLE_VIGILANCE_PROTOCOL</text>
  <text x="30" y="85" fill="#FFC107" font-size="10" opacity="0.8" letter-spacing="1.5">> ORACLE_CORE: ACTIVE</text>
  
  <!-- Right Side Diagnostic telemetry -->
  <text x="770" y="40" fill="#6b7280" font-size="10" font-weight="bold" letter-spacing="1" text-anchor="end">BATCOMPUTER_SHELL: v9.64_AI</text>
  <text x="770" y="55" fill="#4b5563" font-size="9" letter-spacing="1" text-anchor="end">TEMP: 21.4°C // OPTIMAL</text>
  <text x="770" y="70" fill="#4b5563" font-size="9" letter-spacing="1" text-anchor="end">INTELLIGENCE: ML_OP_READY</text>
  <text x="770" y="85" fill="#10B981" font-size="10" letter-spacing="1.5" text-anchor="end">> SYSTEM_DIAGNOSTICS_OK</text>

  <!-- Horizontal Tech divider -->
  <path d="M 220 100 L 360 100 L 375 110 L 425 110 L 440 100 L 580 100" fill="none" stroke="#1f2d3d" stroke-width="1"/>
  
  <!-- Center Stylized Wing Silhouette -->
  <path d="M 370 95 C 380 95, 390 85, 400 72 C 410 85, 420 95, 430 95 C 423 99, 413 102, 400 110 C 387 102, 377 99, 370 95 Z" fill="#111827" stroke="#FFC107" stroke-width="1.5" opacity="0.85"/>
  <circle cx="400" cy="72" r="2.5" fill="#10B981" />

  <!-- Main Identity Titles -->
  <text x="400" y="145" fill="url(#yellowGrad)" font-size="28" font-weight="900" letter-spacing="6" text-anchor="middle" font-family="'Share Tech Mono', monospace">ANISH REDDY</text>
  <text x="400" y="170" fill="#8E9AAF" font-size="11" font-weight="bold" letter-spacing="4" text-anchor="middle" font-family="'Share Tech Mono', monospace">AI &amp; MACHINE LEARNING ENGINEER</text>

  <!-- Cyberpunk vertical grids -->
  <line x1="100" y1="15" x2="100" y2="25" stroke="#1f2d3d" stroke-width="1"/>
  <line x1="700" y1="15" x2="700" y2="25" stroke="#1f2d3d" stroke-width="1"/>
  <line x1="100" y1="175" x2="100" y2="185" stroke="#1f2d3d" stroke-width="1"/>
  <line x1="700" y1="175" x2="700" y2="185" stroke="#1f2d3d" stroke-width="1"/>
</svg>
