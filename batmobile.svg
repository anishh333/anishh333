<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="100%" height="60" style="background:transparent; font-family: monospace;">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5722" stop-opacity="1" />
      <stop offset="50%" stop-color="#FF9800" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFEB3B" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#0F1219" />
    </linearGradient>
  </defs>

  <!-- Animated Batmobile group that runs from left to right -->
  <g>
    <!-- Animation duration: 8 seconds, translating from X=-150 to X=950 -->
    <animateTransform attributeName="transform" type="translate" from="-150 0" to="950 0" dur="8s" repeatCount="indefinite" />

    <!-- Animated Jet Smoke & Flame Behind the Batmobile -->
    <!-- Smoke puff 1 -->
    <circle cx="-15" cy="30" r="4" fill="#4A5568" opacity="0.8">
      <animate attributeName="r" values="4;12;2" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="30;24;20" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Smoke puff 2 -->
    <circle cx="-25" cy="31" r="3" fill="#718096" opacity="0.6">
      <animate attributeName="r" values="3;10;1" dur="0.8s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0" dur="0.8s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="31;26;22" dur="0.8s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Smoke puff 3 -->
    <circle cx="-35" cy="29" r="2" fill="#A0AEC0" opacity="0.5">
      <animate attributeName="r" values="2;8;0" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="29;25;21" dur="0.8s" begin="0.4s" repeatCount="indefinite"/>
    </circle>

    <!-- Flame booster -->
    <path d="M-5 27 L-22 30 L-5 33 Z" fill="url(#flameGrad)">
      <animate attributeName="opacity" values="1;0.4;1" dur="0.12s" repeatCount="indefinite"/>
    </path>

    <!-- Batmobile Chassis Silhouette -->
    <!-- Rear spoiler/fin, cockpit curve, wheel wells, front nose splitter -->
    <path d="M 0 35 
             C 5 25, 12 12, 18 12 
             C 22 12, 25 22, 38 22 
             C 45 22, 52 28, 65 28 
             C 75 28, 82 35, 92 35 
             C 98 35, 102 38, 98 42 
             L 5 42 Z" fill="url(#bodyGrad)" stroke="#4A5568" stroke-width="1.5"/>
             
    <!-- Rear Wings/Fins side accent -->
    <path d="M 12 12 L 2 26 L 15 22 Z" fill="#2D3748" stroke="#4A5568" stroke-width="1"/>
    
    <!-- Cockpit Windshield (Glowing red/cyan tech glass) -->
    <path d="M 38 22 C 43 22, 48 25, 52 28 L 32 28 Z" fill="#E53E3E" opacity="0.8"/>

    <!-- Wheels (Textured with spokes) -->
    <!-- Back wheel -->
    <circle cx="22" cy="42" r="8" fill="#0A0F1D" stroke="#4A5568" stroke-width="2"/>
    <circle cx="22" cy="42" r="4" fill="#2D3748"/>
    <line x1="22" y1="34" x2="22" y2="50" stroke="#718096" stroke-width="1"/>
    <line x1="14" y1="42" x2="30" y2="42" stroke="#718096" stroke-width="1"/>
    
    <!-- Front wheel -->
    <circle cx="75" cy="42" r="8" fill="#0A0F1D" stroke="#4A5568" stroke-width="2"/>
    <circle cx="75" cy="42" r="4" fill="#2D3748"/>
    <line x1="75" y1="34" x2="75" y2="50" stroke="#718096" stroke-width="1"/>
    <line x1="67" y1="42" x2="83" y2="42" stroke="#718096" stroke-width="1"/>
  </g>

  <!-- Ground Grid Line representing the Gotham street -->
  <line x1="0" y1="50" x2="800" y2="50" stroke="#4A5568" stroke-width="1.5"/>
  <line x1="0" y1="53" x2="800" y2="53" stroke="#2D3748" stroke-width="1" stroke-dasharray="12 12"/>
</svg>
