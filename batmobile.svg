<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%" height="80" style="background:transparent; font-family: monospace;">
  <!-- Definitions for gradients and spotlight -->
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3D00" stop-opacity="1" />
      <stop offset="50%" stop-color="#FF9100" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#FFEA00" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>
    <linearGradient id="signalBeam" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#475569" stop-opacity="0" />
      <stop offset="100%" stop-color="#475569" stop-opacity="0.25" />
    </linearGradient>
  </defs>

  <!-- Ground Grid Line representing the Gotham street -->
  <line x1="0" y1="70" x2="800" y2="70" stroke="#334155" stroke-width="2"/>
  <line x1="0" y1="74" x2="800" y2="74" stroke="#1E293B" stroke-dasharray="8 8" stroke-width="1.5"/>

  <!-- Faint, High-Tech Bat-Signal Spotlight in background -->
  <g opacity="0.15" transform="translate(680, 70)">
    <!-- Beam projection -->
    <path d="M 0 0 L -80 -70 A 50 15 0 0 1 10 -70 Z" fill="url(#signalBeam)"/>
    <!-- Target Ellipse containing minimal Bat emblem -->
    <ellipse cx="-35" cy="-70" rx="45" ry="12" fill="#475569"/>
    <!-- Bat shape cutout -->
    <path d="M -50 -70 C -45 -70, -42 -74, -40 -74 C -38 -74, -36 -72, -35 -70 C -34 -72, -32 -74, -30 -74 C -28 -74, -25 -70, -20 -70 C -24 -68, -28 -68, -31 -66 C -33 -65, -34 -67, -35 -68 C -36 -67, -37 -65, -39 -66 C -42 -68, -46 -68, -50 -70 Z" fill="#090D16"/>
  </g>

  <!-- Static Text (Fades in to the left after Batman lands at X=240) -->
  <g>
    <!-- Text fades in at 2.8s (35%), stays visible until 6.5s (81.25%), then resets -->
    <animate attributeName="opacity"
             values="0; 0; 1; 1; 0; 0"
             keyTimes="0; 0.35; 0.40; 0.8125; 0.875; 1"
             dur="8s" repeatCount="indefinite"/>
    <text x="210" y="42" fill="url(#textGrad)" font-size="24" font-weight="900" letter-spacing="4" text-anchor="end" font-family="'Share Tech Mono', monospace">ANISH REDDY</text>
    <text x="210" y="58" fill="#64748B" font-size="10" font-weight="bold" letter-spacing="3" text-anchor="end" font-family="'Share Tech Mono', monospace">AI &amp; MACHINE LEARNING ENGINEER</text>
  </g>

  <!-- Grappling Gun Wire (Fires from Batman's position at X=555 to anchor point at X=240) -->
  <line x1="555" y1="56" x2="555" y2="56" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 3" opacity="0">
    <!-- Shoots from right to left between 2.0s (25%) and 2.2s (27.5%) -->
    <animate attributeName="x2" values="555; 555; 240; 240; 240" keyTimes="0; 0.25; 0.275; 0.3625; 1" dur="8s" repeatCount="indefinite"/>
    <!-- Wire stays active while Batman swings, then fades away -->
    <animate attributeName="opacity" values="0; 0; 0.8; 0.8; 0; 0" keyTimes="0; 0.25; 0.255; 0.3625; 0.365; 1" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Batmobile Group (Parks on the far right, then explodes) -->
  <g>
    <!-- Translation: drives from offscreen left (-150) to rightmost (520) by 1.5s -->
    <animateTransform attributeName="transform" type="translate"
                      values="-150 28; 520 28; 520 28; 520 28"
                      keyTimes="0; 0.1875; 0.80; 1"
                      calcMode="spline"
                      keySplines="0.1 0.8 0.2 1; 0 0 1 1; 0 0 1 1"
                      dur="8s" repeatCount="indefinite" />
                      
    <!-- Batmobile opacity: Explodes at 2.7s (33.75%) and vaporizes by 2.9s (36.25%) -->
    <animate attributeName="opacity"
             values="1; 1; 0; 0"
             keyTimes="0; 0.3375; 0.3625; 1"
             dur="8s" repeatCount="indefinite"/>

    <!-- Tail flame booster (Active when driving) -->
    <path d="M-5 27 L-25 30 L-5 33 Z" fill="url(#flameGrad)"/>

    <!-- Continuous exhaust smoke (Active when driving) -->
    <circle cx="-10" cy="30" r="3" fill="#334155" opacity="0.8">
      <animate attributeName="r" values="3;10;0" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="-10;-25;-40" dur="0.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Sleek Batmobile Chassis -->
    <path d="M 0 35 C 5 25, 12 12, 18 12 C 22 12, 25 22, 38 22 C 45 22, 52 28, 65 28 C 75 28, 82 35, 92 35 C 98 35, 102 38, 98 42 L 5 42 Z" fill="url(#bodyGrad)" stroke="#475569" stroke-width="1.5"/>
    <path d="M 12 12 L 2 26 L 15 22 Z" fill="#1E293B" stroke="#475569" stroke-width="1"/> <!-- Fin -->
    <path d="M 38 22 C 43 22, 48 25, 52 28 L 32 28 Z" fill="#EF4444" opacity="0.8"/> <!-- Cockpit Glass -->

    <!-- Wheels -->
    <circle cx="22" cy="42" r="8" fill="#020617" stroke="#475569" stroke-width="2"/>
    <circle cx="22" cy="42" r="4" fill="#334155"/>
    <circle cx="75" cy="42" r="8" fill="#020617" stroke="#475569" stroke-width="2"/>
    <circle cx="75" cy="42" r="4" fill="#334155"/>
  </g>

  <!-- Nested Gravity Physics Batman Group (Zip-lines from cockpit at X=555 to land at X=240 facing left) -->
  <!-- Outer group: handles horizontal translation with swing drag deceleration -->
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="555 0; 555 0; 555 0; 397 0; 240 0; 240 0; 240 0; 240 0"
                      keyTimes="0; 0.25; 0.275; 0.3125; 0.35; 0.8125; 0.875; 1"
                      calcMode="spline"
                      keySplines="0 0 1 1; 0 0 1 1; 0.4 0 0.2 1; 0.2 0 0.8 1; 0 0 1 1; 0.5 0 0.5 1; 0 0 1 1"
                      dur="8s" repeatCount="indefinite"/>
    <!-- Inner group: handles vertical parabolic drop representing gravity acceleration -->
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0 56; 0 56; 0 56; 0 25; 0 55; 0 55; 0 55; 0 55"
                        keyTimes="0; 0.25; 0.275; 0.3125; 0.35; 0.8125; 0.875; 1"
                        calcMode="spline"
                        keySplines="0 0 1 1; 0 0 1 1; 0.1 0.8 0.3 1; 0.7 0 0.9 0.4; 0 0 1 1; 0.5 0 0.5 1; 0 0 1 1"
                        dur="8s" repeatCount="indefinite"/>

      <!-- Batman opacity: hidden inside cockpit initially, reveals on eject, resets at end -->
      <animate attributeName="opacity"
               values="0; 0; 1; 1; 1; 1; 0; 0"
               keyTimes="0; 0.245; 0.25; 0.275; 0.8125; 0.82; 0.875; 1"
               dur="8s" repeatCount="indefinite"/>

      <!-- Batman Artwork Silhouette -->
      <!-- Head and ears -->
      <path d="M -3 -8 L -3 -12 L -1 -10 L 1 -10 L 3 -12 L 3 -8 Z" fill="#020617"/>
      <circle cx="0" cy="-6" r="3" fill="#020617"/>
      <!-- White glowing detective eyes -->
      <polygon points="-2.2,-7.2 -1.2,-6.7 -1.2,-7.2" fill="#FFFFFF"/>
      <polygon points="-0.2,-7.2 0.8,-6.7 0.8,-7.2" fill="#FFFFFF"/>
      <!-- Cape (Flares out dynamically) -->
      <path d="M -6 -4 L 6 -4 L 12 15 L 4 12 L 0 16 L -4 12 L -8 15 Z" fill="#0F172A" stroke="#334155" stroke-width="0.5"/>
      <!-- Suit -->
      <rect x="-4" y="-3" width="8" height="11" rx="1.5" fill="#1E293B" stroke="#475569" stroke-width="0.5"/>
      <!-- Utility Belt -->
      <rect x="-4" y="3.5" width="8" height="1.5" fill="#64748B"/>
      <!-- Legs -->
      <rect x="-3.2" y="8" width="2.5" height="8" fill="#020617"/>
      <rect x="0.7" y="8" width="2.5" height="8" fill="#020617"/>
    </g>
  </g>

  <!-- Explosion Fireballs (Triggered at X=570, Y=48 when car evaporates at 2.7s/33.75%) -->
  <g transform="translate(570, 48)">
    <!-- Red Primary Blast Wave -->
    <circle cx="0" cy="0" r="0" fill="#FF3D00" opacity="0">
      <animate attributeName="r" values="0; 0; 45; 65; 0" keyTimes="0; 0.3375; 0.3625; 0.45; 1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0; 0; 0.95; 0.6; 0" keyTimes="0; 0.3375; 0.3625; 0.45; 1" dur="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Orange Mid-Layer Explosion -->
    <circle cx="-12" cy="-6" r="0" fill="#FF9100" opacity="0">
      <animate attributeName="r" values="0; 0; 35; 55; 0" keyTimes="0; 0.34; 0.37; 0.46; 1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0; 0; 0.9; 0.5; 0" keyTimes="0; 0.34; 0.37; 0.46; 1" dur="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Yellow Core Fireball -->
    <circle cx="10" cy="4" r="0" fill="#FFEA00" opacity="0">
      <animate attributeName="r" values="0; 0; 25; 38; 0" keyTimes="0; 0.345; 0.375; 0.47; 1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0; 0; 0.95; 0.4; 0" keyTimes="0; 0.345; 0.375; 0.47; 1" dur="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Expanding White Shockwave Ring -->
    <circle cx="0" cy="0" r="0" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0">
      <animate attributeName="r" values="0; 0; 90; 0" keyTimes="0; 0.3375; 0.42; 1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0; 0; 0.8; 0" keyTimes="0; 0.3375; 0.42; 1" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Explosion Flying Debris Chunks (Physics-based parabolic launch) -->
  <!-- Debris 1 (large chunk flying right-upward) -->
  <path d="M -3 -2 L 3 -2 L 2 4 L -2 4 Z" fill="#334155" opacity="0">
    <animateTransform attributeName="transform" type="translate"
                      values="570 48; 640 25; 700 70; 700 70"
                      keyTimes="0; 0.3375; 0.4125; 1"
                      dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
             values="0; 0; 1; 1; 0; 0"
             keyTimes="0; 0.3375; 0.34; 0.60; 0.65; 1"
             dur="8s" repeatCount="indefinite"/>
  </path>
  <!-- Debris 2 (smaller chunk flying left-upward) -->
  <path d="M -2 -1 L 2 -1 L 1 3 L -1 3 Z" fill="#1E293B" opacity="0">
    <animateTransform attributeName="transform" type="translate"
                      values="570 48; 480 18; 400 70; 400 70"
                      keyTimes="0; 0.3375; 0.42; 1"
                      dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
             values="0; 0; 1; 1; 0; 0"
             keyTimes="0; 0.3375; 0.34; 0.60; 0.65; 1"
             dur="8s" repeatCount="indefinite"/>
  </path>
</svg>
